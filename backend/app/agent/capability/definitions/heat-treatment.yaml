capabilities:
  - name: heat_current_stage
    catalog_version: v2
    domain: heat_treatment
    description: 查询热处理记录当前阶段、状态、是否完成或结束。
    business_context: 热处理记录号用于定位一条热处理追溯记录，状态查询回答该记录当前处于创建、进行、完成、转序、结束或取消阶段。
    intent:
      - query_status
      - 热处理当前阶段
      - 热处理做到哪一步
      - 热处理是否完成或结束
      - 热处理编号对应记录状态
    status: enabled
    execution_type: tool
    executor: heat_current_stage
    required_entities:
      - record_no
    input_entities:
      - record_no
    input_schema:
      required:
        - record_no
      optional:
        - record_id
        - object_id
      properties:
        record_no:
          type: string
          description: 热处理记录编号
        record_id:
          type: string
          description: 热处理记录内部标识
        object_id:
          type: string
          description: 用户提供的对象标识
    output_schema:
      required:
        - found
        - record_no
        - status
        - status_name
      properties:
        found:
          type: boolean
        record_no:
          type: string
        status:
          type: string
          enum:
            - CREATED
            - RUNNING
            - FINISHED
            - TRANSFERRED
            - ENDED
            - CANCELLED
        status_name:
          type: string
    api_contract:
      request:
        record_no: 热处理记录编号
      response:
        found: 是否找到记录
        status: 热处理状态编码
        status_name: 热处理状态中文名
    trace_fields:
      - user_input
      - semantic_router_result
      - routing_source
      - capability_name
      - execution_type
      - sql_executed
      - used_tables
    data_sources:
      - type: table
        name: mes_heat_treatment_record
        fields:
          - record_no
          - status
        description: 热处理记录当前状态唯一来源
    examples:
      - HT20260603-007热处理的状态
      - HT20260603-007现在做到哪一步
      - 这个热处理完成了吗 HT20260603-007
    example_queries:
      - HT20260603-007热处理状态
      - HT20260603-007现在热处理到哪一步
      - 这个热处理完成了吗 HT20260603-007
    boundaries:
      - 不负责转序单状态
      - 不负责检验状态
      - 不负责仓库状态
      - 不推断 PLC 设备状态
    legacy_source: old python constant
  - name: heat_completion_count_monthly
    catalog_version: v2
    domain: heat_treatment
    description: 统计本月热处理完成批次数，属于分析型只读查询能力。
    business_context: 完成批次数用于按时间范围统计热处理完成量，适合回答本月、当月等聚合分析问题。
    intent:
      - analyze_completion_count
      - 统计本月热处理完成数量
      - 本月热处理完成多少批
    status: enabled
    execution_type: readonly_sql
    executor: text_to_sql
    required_entities:
      - time_range
    input_entities:
      - time_range
    input_schema:
      required:
        - question
      optional:
        - time_range
      properties:
        question:
          type: string
          description: 用户原始分析问题
        time_range:
          type: string
          description: 统计时间范围
    output_schema:
      required:
        - rows
        - row_count
        - validated_sql
      properties:
        rows:
          type: array
        row_count:
          type: integer
        validated_sql:
          type: string
    api_contract:
      request:
        question: 用户原始统计问题
        time_range: 统计时间范围
      response:
        rows: 统计结果行
        row_count: 返回行数
        validated_sql: 已验证的只读 SQL
    trace_fields:
      - user_input
      - semantic_router_result
      - routing_source
      - capability_name
      - execution_type
      - sql_executed
      - used_tables
    data_sources:
      - type: table
        name: mes_heat_treatment_record
        fields:
          - status
          - finished_time
        description: 热处理完成数量统计来源
    examples:
      - 本月热处理完成多少批
      - 统计本月热处理完成数量
    example_queries:
      - 本月热处理完成多少批
      - 统计本月热处理完成数量
    boundaries:
      - 只允许只读统计查询
      - 不负责单个热处理记录状态
      - 不负责跨业务模块自由查询
    legacy_source: none
  - name: heat_device_trace
    catalog_version: v2
    domain: heat_treatment
    description: 查询指定热处理追溯记录对应的生产设备。
    business_context: 热处理追溯编号用于定位热处理过程记录，设备、炉子、哪台炉等表达都指向热处理执行设备。
    intent:
      - query_device
      - 查询热处理设备
      - 查询热处理炉子
      - 热处理在哪个设备进行
    status: planned
    execution_type: tool
    executor: heat_device_trace
    required_entities:
      - record_no
    input_entities:
      - record_no
    input_schema:
      required:
        - record_no
      properties:
        record_no:
          type: string
          description: 热处理追溯记录编号
    output_schema:
      required:
        - found
        - record_no
        - equipment_name
      properties:
        found:
          type: boolean
        record_no:
          type: string
        equipment_name:
          type: string
    api_contract:
      request:
        record_no: 热处理追溯记录编号
      response:
        found: 是否找到记录
        equipment_name: 热处理执行设备或炉号
    trace_fields:
      - user_input
      - capability_name
      - execution_type
      - tool_name
    data_sources:
      - type: table
        name: mes_heat_treatment_record
        fields:
          - record_no
          - equipment_name
        description: 待绑定真实热处理设备来源字段
    examples:
      - TRACE-HTR-B-H-001在哪个设备进行
      - 这个热处理在哪个炉子完成
      - TRACE-HTR-B-H-001哪台炉做的
    example_queries:
      - TRACE-HTR-B-H-001在哪个设备进行
      - TRACE-HTR-B-H-001在哪个炉子完成
      - 这个热处理在哪台炉做的 TRACE-HTR-B-H-001
    boundaries:
      - 本轮只验证 Capability Reasoning，不实现 Tool
      - 不查询状态
      - 不统计完成数量
    legacy_source: none
